# Aligned with dataset meta/features (see configs/data/info.json): v2.1, armigo4, 3 cams @ 480x640, 7D state & action.
train:
  _target_: fastwam.datasets.lerobot.robot_video_dataset.RobotVideoDataset
  dataset_dirs:
    - /home/datasets/ours_dataset/cytoderm15_lerobot_v2/
  shape_meta:
    images:
      # observation.images.top_image
      - key: top_image
        raw_shape: [3, 480, 640]
        shape: [3, 224, 224]
      # observation.images.front_image
      - key: front_image
        raw_shape: [3, 480, 640]
        shape: [3, 224, 224]
      # observation.images.right_wrist_image
      - key: right_wrist_image
        raw_shape: [3, 480, 640]
        shape: [3, 224, 224]
    action:
      - key: default
        raw_shape: 7
        shape: 7
    state:
      - key: default
        raw_shape: 7
        shape: 7
  # 33 keeps (num_frames-1)/action_video_freq_ratio == 8, divisible by 4 for video tokenization (see RobotVideoDataset).
  num_frames: 33
  global_sample_stride: 1
  action_video_freq_ratio: 4
  # Horizontal concat: 3 x 224-wide panels -> 224 x 672 before resize/crop to video_size.
  video_size: [224, 672]
  camera_key: null
  val_set_proportion: 0.0
  is_training_set: true
  skip_padding_as_possible: false
  concat_multi_camera: "horizontal"
  pretrained_norm_stats: null
  processor:
    _target_: fastwam.datasets.lerobot.processors.fastwam_processor.FastWAMProcessor
    shape_meta: ${data.train.shape_meta}
    num_obs_steps: ${data.train.num_frames}
    num_output_cameras: 3
    action_output_dim: 7
    proprio_output_dim: 7
    # 7D absolute end-effector pose (same convention as parquet); all false => no dim treated as delta for padding.
    delta_action_dim_mask:
      default: [false, false, false, false, false, false, false]
    action_state_transforms: null
    use_stepwise_action_norm: false
    norm_default_mode: min/max
    norm_exception_mode: null
    action_state_merger:
      _target_: fastwam.datasets.lerobot.transforms.action_state_merger.ConcatLeftAlign
    train_transforms:
      - _target_: fastwam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [224, 224]
    val_transforms:
      - _target_: fastwam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [224, 224]
  text_embedding_cache_dir: ./data/text_embeds_cache/my_robot
  context_len: 128
